name: "🔄 LinkedIn Token Refresh"

on:
  schedule:
    # Runs every Sunday at 6:00 UTC to check token expiry
    - cron: '0 6 * * 0'

  workflow_dispatch: {}

jobs:
  refresh-token:
    name: Refresh LinkedIn OAuth Token
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Verificar y refrescar token LinkedIn
        env:
          WORKER_URL:    ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: |
          echo "🔑 Comprobando token de LinkedIn…"
          RESPONSE=$(curl -s -X POST "${WORKER_URL}/api/auth/refresh" \
            -H "Authorization: Bearer ${WORKER_SECRET}" \
            -H "Content-Type: application/json")
          echo "Respuesta: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "❌ Error al refrescar token. Revisa el dashboard."
            exit 1
          else
            echo "✅ Token de LinkedIn actualizado correctamente."
          fi
