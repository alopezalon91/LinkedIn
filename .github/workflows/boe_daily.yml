name: "📋 BOE Daily Scraper"

on:
  schedule:
    # Runs every day at 7:30 UTC (9:30h España hora peninsular en verano)
    - cron: '30 7 * * 1-5'  # Lunes a viernes

  # Allow manual trigger from GitHub UI or API
  workflow_dispatch:
    inputs:
      date:
        description: 'Fecha BOE (YYYYMMDD). Vacío = hoy'
        required: false
        default: ''
      dry_run:
        description: 'Sólo generar posts, no enviar al dashboard'
        type: boolean
        required: false
        default: false

jobs:
  scrape-boe:
    name: Scrape BOE & Generate Posts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🔎 Ejecutar scraper BOE
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          WORKER_URL:          ${{ secrets.WORKER_URL }}
          WORKER_SECRET:       ${{ secrets.WORKER_SECRET }}
          BOE_DATE:            ${{ github.event.inputs.date }}
          DRY_RUN:             ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "🗞️  Iniciando scraper BOE — $(date '+%Y-%m-%d %H:%M UTC')"
          python main.py --module boe

      - name: 📊 Resumen
        if: always()
        run: echo "✅ BOE scraper completado. Revisa el dashboard para aprobar los posts generados."
