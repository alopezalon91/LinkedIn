name: Render Faceless Video

on:
  repository_dispatch:
    types: [render_video]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick

      - name: Configure ImageMagick
        run: |
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts moviepy==1.0.3 requests

      - name: Save Video Payload to JSON
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: echo "$PAYLOAD" > video_payload.json

      - name: Run Video Generator Script
        run: python scripts/render_faceless.py

      - name: Upload Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reel_final_linkedin
          path: reel_final_linkedin.mp4
          retention-days: 7

      - name: Send Video to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -F document=@"reel_final_linkedin.mp4" -F caption="🎬 Tu Reel de LinkedIn ya está listo." "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument?chat_id=${TELEGRAM_CHAT_ID}"
          fi
