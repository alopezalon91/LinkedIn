name: "📰 News Scraper (cada 6h)"

on:
  schedule:
    # Runs at 6h, 10h, 14h, 18h, 22h UTC — 8h, 12h, 16h, 20h, 00h España
    - cron: '0 6,10,14,18,22 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Sólo generar posts, no enviar al dashboard'
        type: boolean
        required: false
        default: false
      query:
        description: 'Búsqueda por palabra clave (opcional)'
        type: string
        required: false
        default: ''

jobs:
  scrape-news:
    name: Scrape Press & Generate Posts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 📰 Ejecutar scraper de noticias
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          WORKER_URL:       ${{ secrets.WORKER_URL }}
          WORKER_SECRET:    ${{ secrets.WORKER_SECRET }}
          DRY_RUN:          ${{ github.event.inputs.dry_run || 'false' }}
          SEARCH_QUERY:     ${{ github.event.inputs.query }}
        run: |
          echo "📰 Iniciando scraper de noticias — $(date '+%Y-%m-%d %H:%M UTC')"
          if [ -n "$SEARCH_QUERY" ]; then
            python main.py --module news --query "$SEARCH_QUERY"
          else
            python main.py --module news
          fi

      - name: 📊 Resumen
        if: always()
        run: echo "✅ News scraper completado."
