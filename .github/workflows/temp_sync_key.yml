name: "🔑 Temp Sync Groq Key"
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Groq Key
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"groq_key\": \"${{ secrets.GROQ_API_KEY }}\"}" \
            "${{ secrets.WORKER_URL }}/api/config/set-groq-key"
